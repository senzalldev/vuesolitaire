<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <pattern id="crosshatch" patternUnits="userSpaceOnUse" width="12" height="12">
      <line x1="0" y1="12" x2="12" y2="0" stroke="#b8922a" stroke-width="0.4" opacity="0.25"/>
      <line x1="-2" y1="2" x2="2" y2="-2" stroke="#b8922a" stroke-width="0.4" opacity="0.25"/>
      <line x1="10" y1="14" x2="14" y2="10" stroke="#b8922a" stroke-width="0.4" opacity="0.25"/>
    </pattern>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1836"/>
      <stop offset="100%" stop-color="#0d0b18"/>
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#120f22"/>
      <stop offset="100%" stop-color="#0a0812"/>
    </radialGradient>
  </defs>

  <!-- Card background -->
  <rect width="200" height="280" rx="10" ry="10" fill="url(#bgGrad)"/>

  <!-- Crosshatch texture -->
  <rect width="200" height="280" rx="10" ry="10" fill="url(#crosshatch)"/>

  <!-- Outer gold border -->
  <rect x="6" y="6" width="188" height="268" rx="8" ry="8" fill="none" stroke="#b8922a" stroke-width="2"/>

  <!-- Inner border -->
  <rect x="12" y="12" width="176" height="256" rx="6" ry="6" fill="none" stroke="#b8922a" stroke-width="0.8" opacity="0.5"/>

  <!-- Central medallion background -->
  <circle cx="100" cy="140" r="62" fill="url(#centerGlow)" stroke="#2e2650" stroke-width="1"/>

  <!-- Outer ring -->
  <circle cx="100" cy="140" r="58" fill="none" stroke="#b8922a" stroke-width="1.5"/>
  <circle cx="100" cy="140" r="52" fill="none" stroke="#b8922a" stroke-width="0.5" opacity="0.5"/>

  <!-- Four-pointed GW2-style compass rose -->
  <!-- Top spike -->
  <polygon points="100,82 107,130 100,138 93,130" fill="#b8922a" opacity="0.95"/>
  <!-- Bottom spike -->
  <polygon points="100,198 107,150 100,142 93,150" fill="#b8922a" opacity="0.95"/>
  <!-- Left spike -->
  <polygon points="38,140 88,133 96,140 88,147" fill="#b8922a" opacity="0.95"/>
  <!-- Right spike -->
  <polygon points="162,140 112,133 104,140 112,147" fill="#b8922a" opacity="0.95"/>

  <!-- Diagonal accent lines -->
  <line x1="70" y1="110" x2="80" y2="120" stroke="#b8922a" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="110" x2="120" y2="120" stroke="#b8922a" stroke-width="1" opacity="0.4"/>
  <line x1="70" y1="170" x2="80" y2="160" stroke="#b8922a" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="170" x2="120" y2="160" stroke="#b8922a" stroke-width="1" opacity="0.4"/>

  <!-- Center gem -->
  <circle cx="100" cy="140" r="14" fill="#1e1836" stroke="#b8922a" stroke-width="1.5"/>
  <circle cx="100" cy="140" r="9" fill="#7c3aed" opacity="0.8"/>
  <circle cx="100" cy="140" r="5" fill="#d4aa4a"/>
  <circle cx="98" cy="138" r="2" fill="#ffffff" opacity="0.3"/>

  <!-- Corner ornaments - top left -->
  <path d="M18,18 L32,18 M18,18 L18,32" stroke="#b8922a" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <rect x="20" y="20" width="4" height="4" fill="#b8922a" opacity="0.5" rx="1"/>

  <!-- Corner ornaments - top right -->
  <path d="M182,18 L168,18 M182,18 L182,32" stroke="#b8922a" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <rect x="176" y="20" width="4" height="4" fill="#b8922a" opacity="0.5" rx="1"/>

  <!-- Corner ornaments - bottom left -->
  <path d="M18,262 L32,262 M18,262 L18,248" stroke="#b8922a" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <rect x="20" y="256" width="4" height="4" fill="#b8922a" opacity="0.5" rx="1"/>

  <!-- Corner ornaments - bottom right -->
  <path d="M182,262 L168,262 M182,262 L182,248" stroke="#b8922a" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <rect x="176" y="256" width="4" height="4" fill="#b8922a" opacity="0.5" rx="1"/>

  <!-- Small "S" monogram at top and bottom -->
  <text x="100" y="40" text-anchor="middle" font-family="serif" font-size="14" fill="#b8922a" opacity="0.7" font-weight="bold">S</text>
  <text x="100" y="250" text-anchor="middle" font-family="serif" font-size="14" fill="#b8922a" opacity="0.7" font-weight="bold" transform="rotate(180,100,247)">S</text>
</svg>
